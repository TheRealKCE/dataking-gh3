<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're Offline — ARHMS DATA LTD</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0A0A0A;
      color: #fff;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .logo-ring {
      width: 88px;
      height: 88px;
      border-radius: 24px;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
      box-shadow: 0 0 40px rgba(16, 185, 129, 0.3);
    }

    .logo-ring img {
      width: 56px;
      height: 56px;
      object-fit: contain;
      border-radius: 12px;
    }

    .icon-placeholder {
      font-size: 36px;
      font-weight: 900;
      color: #fff;
    }

    h1 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 10px;
      color: #fff;
    }

    p {
      font-size: 14px;
      color: #9ca3af;
      max-width: 280px;
      line-height: 1.6;
      margin-bottom: 36px;
    }

    .wifi-icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 20px;
      opacity: 0.4;
    }

    button {
      background: linear-gradient(135deg, #10b981, #059669);
      color: #000;
      border: none;
      padding: 14px 32px;
      border-radius: 100px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: 0.2px;
      transition: opacity 0.15s;
      box-shadow: 0 4px 20px rgba(16, 185, 129, 0.4);
    }

    button:hover { opacity: 0.9; }
    button:active { transform: scale(0.97); }

    .divider {
      width: 40px;
      height: 2px;
      background: #1f2937;
      border-radius: 2px;
      margin: 36px auto;
    }

    .tip {
      font-size: 12px;
      color: #4b5563;
      max-width: 260px;
    }
  </style>
</head>
<body>

  <div class="logo-ring">
    <img src="/logo.png" alt="ARHMS" onerror="this.parentNode.innerHTML='<span class=\'icon-placeholder\'>A</span>'" />
  </div>

  <svg class="wifi-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="1.5">
    <path stroke-linecap="round" stroke-linejoin="round" d="M8.288 15.038a5.25 5.25 0 017.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12.53 18.22l-.53.53-.53-.53a.75.75 0 011.06 0z" />
    <line x1="3" y1="3" x2="21" y2="21" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  </svg>

  <h1>You're Offline</h1>
  <p>No internet connection detected. Check your network and try again.</p>

  <button onclick="window.location.reload()">Try Again</button>

  <div class="divider"></div>
  <p class="tip">Previously visited pages may still be available. Go back and browse what's cached.</p>

</body>
</html>
